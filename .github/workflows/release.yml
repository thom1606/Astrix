name: Release

# Cut a release by pushing to `release/production`. The appcast commit the
# job makes only touches docs/**, which is ignored here so it can't re-trigger.
on:
  push:
    branches: [release/production]
    paths-ignore:
      - "docs/**"

# Allow creating releases and pushing the updated appcast.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # stay on the branch so we can push the appcast
          fetch-depth: 0

      - name: Generate Configuration/Global.xcconfig
        env:
          # Each ASTRIX_* var below is written into Global.xcconfig with the
          # prefix stripped (ASTRIX_TEAM_IDENTIFIER -> TEAM_IDENTIFIER). Add more
          # ASTRIX_* lines here as the config grows — the step picks them up
          # automatically; no other change needed.
          ASTRIX_TEAM_IDENTIFIER: ${{ secrets.ASTRIX_TEAM_IDENTIFIER }}
        run: |
          mkdir -p Configuration
          {
            echo "// Generated by .github/workflows/release.yml — do not edit."
            env | grep '^ASTRIX_' | sort | while IFS='=' read -r name value; do
              printf '%s = %s\n' "${name#ASTRIX_}" "$value"
            done
          } > Configuration/Global.xcconfig
          if ! grep -qE '^TEAM_IDENTIFIER = .+$' Configuration/Global.xcconfig; then
            echo "::error::ASTRIX_TEAM_IDENTIFIER secret is missing or empty."
            exit 1
          fi
          echo "Generated Configuration/Global.xcconfig (values redacted):"
          sed 's/=.*/= ***/' Configuration/Global.xcconfig

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Read version
        id: version
        run: |
          MARKETING_VERSION="$(xcodebuild -project Astrix.xcodeproj -scheme Astrix -configuration Release -showBuildSettings 2>/dev/null | awk '$1=="MARKETING_VERSION"{print $3; exit}')"
          echo "marketing=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $MARKETING_VERSION"

      - name: Guard against re-releasing an existing version
        run: |
          TAG="v${{ steps.version.outputs.marketing }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump MARKETING_VERSION before pushing."
            exit 1
          fi
          echo "$TAG is available."

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          echo "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc_key.p8"

      - name: Build, notarize & publish
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_PATH: ${{ runner.temp }}/asc_key.p8
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ./scripts/release.sh
